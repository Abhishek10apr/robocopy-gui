<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RoboCopy GUI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .output {
            margin-top: 20px;
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #334155;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 RoboCopy GUI</h1>

    <label>Source Path</label>
    <input type="text" id="source" placeholder="D:\\Folder">

    <label>Destination Path</label>
    <input type="text" id="destination" placeholder="E:\\Backup">

    <label>File Name (optional)</label>
    <input type="text" id="filename" placeholder="example.iso">

    <label>Mode</label>
    <select id="mode">
        <option value="copy">Copy</option>
        <option value="move">Move</option>
        <option value="mirror">Mirror</option>
    </select>

    <button onclick="startCopy()">Start</button>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="output" id="output"></div>
</div>

<script>
async function startCopy() {
    const source = document.getElementById("source").value;
    const destination = document.getElementById("destination").value;
    const filename = document.getElementById("filename").value;
    const mode = document.getElementById("mode").value;
    const output = document.getElementById("output");
    const progress = document.getElementById("progress");

    output.innerHTML = "Starting...\n";
    progress.style.width = "10%";

    try {
        const response = await fetch("http://127.0.0.1:5000/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                source,
                destination,
                filename,
                mode
            })
        });

        const data = await response.json();

        progress.style.width = "100%";
        output.innerHTML += data.output;

    } catch (err) {
        output.innerHTML += "\nError: " + err;
        progress.style.width = "0%";
    }
}
</script>

</body>
</html>
